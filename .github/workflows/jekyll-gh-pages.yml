name: Deploy Vite to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Validate required frontend env
        run: |
          if [ -z "${{ vars.VITE_API_BASE_URL }}" ]; then
            echo "Missing repository variable: VITE_API_BASE_URL"
            echo "Set it in Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi

      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          GEMINI_API_KEY: ${{ vars.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ vars.VITE_GEMINI_API_KEY }}

      - run: touch ./dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
